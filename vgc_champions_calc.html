<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VGC 2026 Champions — Team Builder & Damage Calc</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0a0c10;
    --panel: #111318;
    --card: #181b22;
    --border: #252933;
    --accent: #e8c44a;
    --accent2: #5b8dee;
    --danger: #e85b5b;
    --success: #4be87a;
    --text: #d4d8e2;
    --muted: #636b7a;
    --slot-active: #1a2035;

    --Normal: #9ea09e; --Fire: #e75f3b; --Water: #6294f5;
    --Electric: #f8d948; --Grass: #72c950; --Ice: #96d9d6;
    --Fighting: #c12f2a; --Poison: #a63f9e; --Ground: #d9a550;
    --Flying: #89aae3; --Psychic: #e8536e; --Bug: #a8b820;
    --Rock: #b8a038; --Ghost: #705898; --Dragon: #6f35fc;
    --Dark: #4f3a26; --Steel: #b8b8d0; --Fairy: #f0a2c0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Rajdhani', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
  }

  /* ── HEADER ── */
  header {
    background: linear-gradient(135deg, #0d1017 0%, #141820 100%);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--accent);
    text-transform: uppercase;
  }
  header .subtitle {
    font-size: 12px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    margin-top: 2px;
    letter-spacing: 1px;
  }
  .header-badge {
    background: var(--accent);
    color: #000;
    font-size: 10px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 2px;
    letter-spacing: 1px;
    margin-left: auto;
  }

  /* ── LAYOUT ── */
  .app {
    display: grid;
    grid-template-columns: 420px 1fr;
    grid-template-rows: auto 1fr;
    height: calc(100vh - 58px);
    gap: 0;
  }

  /* ── FIELD CONDITIONS BAR ── */
  .field-bar {
    grid-column: 1 / -1;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
  }
  .field-label {
    font-size: 11px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-right: 4px;
  }
  .field-group {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .field-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 4px 10px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
  }
  .field-btn:hover { border-color: var(--accent); color: var(--text); }
  .field-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
  .field-divider { width: 1px; height: 24px; background: var(--border); }

  /* Slider adversaires */
  .adv-slider-wrap { display: none; }

  /* Inline stat inputs in matchup table */
  .def-spinner {
    display: flex;
    align-items: center;
    gap: 3px;
    white-space: nowrap;
  }
  .def-spinner-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.5px;
    min-width: 22px;
  }
  .def-sp-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 9px;
    line-height: 1;
    width: 16px;
    height: 16px;
    padding: 0;
    cursor: pointer;
    border-radius: 2px;
    transition: background 0.1s, color 0.1s;
    font-family: 'IBM Plex Mono', monospace;
    display: flex; align-items: center; justify-content: center;
  }
  .def-sp-btn:hover { background: #1e222e; color: var(--text); }
  .def-sp-val {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--accent2);
    font-weight: 700;
    min-width: 22px;
    text-align: center;
    border: 1px solid transparent;
    border-radius: 2px;
    padding: 1px 2px;
    cursor: text;
    transition: border-color 0.1s;
  }
  .def-sp-val:hover { border-color: var(--border); }
  .def-sp-val:focus { border-color: var(--accent2); outline: none; background: #0e1016; }

  /* ── TEAM PANEL ── */
  .team-panel {
    grid-column: 1;
    grid-row: 2;
    background: var(--panel);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .team-title {
    font-size: 11px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
  }

  .pokemon-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 12px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    position: relative;
  }
  .pokemon-card:hover { border-color: #333a4a; }
  .pokemon-card.selected {
    border-color: var(--accent);
    background: var(--slot-active);
  }
  .pokemon-card.selected::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
    border-radius: 4px 0 0 4px;
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .slot-num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    min-width: 20px;
  }
  .pokemon-card.selected .slot-num { color: var(--accent); }

  .poke-name-display {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.5px;
    flex: 1;
  }
  .type-badge {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 2px;
    letter-spacing: 0.5px;
    color: #fff;
  }

  .card-selects {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-bottom: 8px;
  }
  .card-selects-full { grid-column: 1/-1; }

  select, input[type=number] {
    background: #0e1016;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    padding: 5px 8px;
    border-radius: 2px;
    width: 100%;
    outline: none;
    transition: border-color 0.15s;
  }
  select:hover, input[type=number]:hover { border-color: #353d50; }
  select:focus, input[type=number]:focus { border-color: var(--accent2); }
  select option { background: #141820; }

  /* Stats SP spinners */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 4px;
    margin-top: 6px;
  }
  .stat-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .stat-label {
    font-size: 9px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--muted);
    letter-spacing: 0.5px;
  }
  .sp-spinner {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1px;
    width: 100%;
  }
  .sp-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 10px;
    line-height: 1;
    width: 100%;
    padding: 2px 0;
    cursor: pointer;
    border-radius: 2px;
    transition: background 0.1s, color 0.1s, border-color 0.1s;
    font-family: 'IBM Plex Mono', monospace;
  }
  .sp-btn:hover { background: #1e222e; color: var(--text); border-color: #353d50; }
  .sp-btn:active { background: #252933; }
  .sp-val-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0px;
  }
  .stat-val {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    font-weight: 700;
    cursor: text;
    min-width: 22px;
    text-align: center;
    border: 1px solid transparent;
    border-radius: 2px;
    padding: 1px 2px;
    transition: border-color 0.1s;
  }
  .stat-val:hover { border-color: var(--border); }
  .stat-val:focus { border-color: var(--accent2); outline: none; background: #0e1016; }
  .stat-total {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text);
  }
  .stat-sp-label {
    font-size: 8px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  /* Stat boost dropdown */
  .stat-boost-sel {
    background: #0e1016;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    padding: 2px 1px;
    border-radius: 2px;
    width: 100%;
    outline: none;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
    -webkit-appearance: none;
    appearance: none;
  }
  .stat-boost-sel:focus { border-color: var(--accent2); }
  .stat-boost-sel.boosted  { border-color: var(--success); color: var(--success); }
  .stat-boost-sel.dropped  { border-color: var(--danger);  color: var(--danger);  }
  .stat-boost-sel option { background: #141820; color: var(--text); }

  /* ── RESULTS PANEL ── */
  .results-panel {
    grid-column: 2;
    grid-row: 2;
    background: var(--bg);
    overflow-y: auto;
    padding: 16px 20px;
  }

  .results-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }
  .results-title {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 1px;
  }
  .view-toggle {
    display: flex;
    gap: 4px;
    margin-left: auto;
  }
  .view-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Rajdhani', sans-serif;
    font-size: 12px;
    font-weight: 600;
    padding: 4px 12px;
    cursor: pointer;
    border-radius: 2px;
    letter-spacing: 1px;
    transition: all 0.15s;
  }
  .view-btn.active { background: var(--accent2); color: #fff; border-color: var(--accent2); }

  /* Summary cards */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
    margin-bottom: 20px;
  }
  .summary-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 12px;
  }
  .summary-card-title {
    font-size: 11px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--muted);
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .summary-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 3px 0;
    border-bottom: 1px solid #1a1d25;
    font-size: 13px;
  }
  .summary-item:last-child { border-bottom: none; }
  .summary-rank {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    min-width: 16px;
  }
  .summary-poke { flex: 1; font-weight: 600; }
  .summary-move { font-size: 11px; color: var(--muted); flex: 1; text-align: right; }
  .dmg-bar-wrap {
    width: 100%;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 3px;
  }
  .dmg-bar {
    height: 3px;
    border-radius: 2px;
    background: var(--accent);
    transition: width 0.3s;
  }
  .dmg-bar.ko { background: var(--danger); }
  .dmg-bar.ohko { background: var(--success); }

  .pct-text {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    min-width: 52px;
    text-align: right;
  }
  .pct-text.ko { color: var(--danger); }
  .pct-text.ohko { color: var(--success); }

  /* Full list table */
  .full-list { display: none; }
  .full-list.visible { display: block; }
  .summary-view.hidden { display: none; }

  .filter-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
    align-items: center;
    flex-wrap: wrap;
  }
  .filter-input {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    padding: 5px 10px;
    border-radius: 2px;
    width: 200px;
    outline: none;
  }
  .filter-input:focus { border-color: var(--accent2); }

  .damage-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .damage-table th {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    text-align: left;
    padding: 6px 10px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  .damage-table th:hover { color: var(--text); }
  .damage-table th.sorted { color: var(--accent); }
  .damage-table td {
    padding: 5px 10px;
    border-bottom: 1px solid #161920;
    vertical-align: middle;
  }
  .damage-table tr:hover td { background: #141720; }
  .damage-table tr.subrow td {
    padding: 3px 10px 6px;
    border-bottom: 1px solid var(--border);
    background: #0f1117;
  }
  .damage-table tr.mainrow td { border-bottom: none; }
  .subrow-controls {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: nowrap;
    overflow-x: auto;
  }
  .adv-nat-sel {
    background: #0e1016;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    padding: 2px 4px;
    border-radius: 2px;
    outline: none;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
    -webkit-appearance: none;
    appearance: none;
    min-width: 70px;
    max-width: 100px;
    flex-shrink: 0;
  }
  .adv-nat-sel:focus { border-color: var(--accent2); }
  .adv-nat-sel.boosted { border-color: var(--success); color: var(--success); }
  .adv-nat-sel.dropped { border-color: var(--danger);  color: var(--danger); }
  .adv-nat-sel option { background: #141820; color: var(--text); }

  .type-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: 4px;
    vertical-align: middle;
  }

  .ko-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    font-weight: 700;
    padding: 2px 5px;
    border-radius: 2px;
    margin-left: 4px;
    letter-spacing: 0.5px;
  }
  .ko-badge.ohko { background: #0d2416; color: var(--success); border: 1px solid #1e4a28; }
  .ko-badge.ko { background: #200d0d; color: var(--danger); border: 1px solid #4a1a1a; }

  .no-selection {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 300px;
    color: var(--muted);
    gap: 12px;
  }
  .no-selection-icon { font-size: 48px; opacity: 0.3; }
  .no-selection-text { font-size: 14px; letter-spacing: 1px; }

  .pct-bar-cell { min-width: 80px; }

  /* Section titles */
  .section-title {
    font-size: 13px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin: 16px 0 8px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  .loading {
    text-align: center;
    padding: 40px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 2px;
  }

  .poke-placeholder { color: var(--muted); font-style: italic; font-size: 14px; }

  /* Mega forme selector */
  .mega-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 6px;
    flex-wrap: wrap;
  }
  .mega-label {
    font-size: 9px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--accent);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .mega-btn {
    background: var(--card);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
    letter-spacing: 0.5px;
  }
  .mega-btn:hover { background: var(--accent); color: #000; }
  .mega-btn.active { background: var(--accent); color: #000; }
  .mega-stone-tag {
    font-size: 10px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--muted);
    background: #0e1016;
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 2px 6px;
  }

  /* Move selectors */
  .moves-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5px;
    margin-top: 6px;
    padding-top: 6px;
    border-top: 1px solid var(--border);
  }
  .move-slot {
    position: relative;
  }
  .move-slot select {
    padding-left: 22px;
    font-size: 12px;
  }
  .move-type-dot {
    position: absolute;
    left: 7px;
    top: 50%;
    transform: translateY(-50%);
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--muted);
    pointer-events: none;
    z-index: 1;
  }
  .moves-label {
    font-size: 9px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 6px;
    margin-bottom: 2px;
  }

  /* Moves section */
  .moves-section {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px;
    margin-top: 6px;
    padding-top: 6px;
    border-top: 1px solid var(--border);
  }
  .move-slot {
    position: relative;
  }
  .move-slot select {
    padding-left: 18px;
    font-size: 12px;
  }
  .move-type-dot {
    position: absolute;
    left: 6px;
    top: 50%;
    transform: translateY(-50%);
    width: 8px;
    height: 8px;
    border-radius: 50%;
    pointer-events: none;
    background: var(--muted);
  }
  .moves-label {
    grid-column: 1/-1;
    font-size: 9px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 2px;
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>Champions Calc</h1>
    <div class="subtitle">VGC 2026 · Régulation MA · Stat Points System</div>
  </div>
  <div class="header-badge">REG MA</div>
</header>

<div class="app">

  <!-- FIELD CONDITIONS -->
  <div class="field-bar">
    <span class="field-label">Météo</span>
    <div class="field-group" id="weatherGroup">
      <button class="field-btn active" data-val="">Neutre</button>
      <button class="field-btn" data-val="Sun">Soleil</button>
      <button class="field-btn" data-val="Rain">Pluie</button>
      <button class="field-btn" data-val="Sand">Sable</button>
      <button class="field-btn" data-val="Snow">Neige</button>
    </div>
    <div class="field-divider"></div>
    <span class="field-label">Terrain</span>
    <div class="field-group" id="terrainGroup">
      <button class="field-btn active" data-val="">Neutre</button>
      <button class="field-btn" data-val="Electric">Élec.</button>
      <button class="field-btn" data-val="Grassy">Herbeux</button>
      <button class="field-btn" data-val="Psychic">Psy.</button>
      <button class="field-btn" data-val="Misty">Brumeux</button>
    </div>
    <div class="adv-slider-wrap">
      <span class="field-label">SP Adversaires</span>
      <input type="range" id="advSpSlider" min="0" max="32" value="0">
      <span class="adv-sp-val" id="advSpVal">0</span>
    </div>
  </div>

  <!-- TEAM PANEL -->
  <div class="team-panel">

// Arrondi officiel Pokémon (NCP) : strictement > 0.5 → ceil, sinon → floor
// (0.5 exactement arrondit vers le bas, contrairement à Math.floor(n+0.5))
function pokeRound(n) {
  return (n % 1 > 0.5) ? Math.ceil(n) : Math.floor(n);
}

function calcHP(baseHP, sp) {
  if (baseHP === 1) return 1;
  return Math.floor((baseHP * 2 + 31) * 50 / 100) + 50 + 10 + sp;
}

function calcStat(base, sp, natureMods, statKey) {
  // Si même stat dans +10% et -10% : nature invalide, on applique ×1 (neutre)
  const plus  = natureMods[0] || '';
  const minus = natureMods[1] || '';
  const natureBonus = (plus && plus === minus) ? 1
                    : plus  === statKey ? 1.1
                    : minus === statKey ? 0.9
                    : 1;
  return Math.floor((Math.floor((base * 2 + 31) * 50 / 100) + 5 + sp) * natureBonus);
}

function getStats(pokeData, sps, natPlus, natMinus) {
  const nat = [natPlus || '', natMinus || ''];
  const bs = pokeData.bs;
  return {
    hp: calcHP(bs.hp, sps.hp),
    at: calcStat(bs.at, sps.at, nat, 'at'),
    df: calcStat(bs.df, sps.df, nat, 'df'),
    sa: calcStat(bs.sa, sps.sa, nat, 'sa'),
    sd: calcStat(bs.sd, sps.sd, nat, 'sd'),
    sp: calcStat(bs.sp, sps.sp, nat, 'sp'),
  };
}

// ═══════════════════════════════════════════════════
// TYPE EFFECTIVENESS
// ═══════════════════════════════════════════════════
function getTypeEff(moveType, defType1, defType2) {
  const chart = TYPE_EFF[moveType] || {};
  let eff = 1;
  if (defType1) eff *= (chart[defType1] !== undefined ? chart[defType1] : 1);
  if (defType2) eff *= (chart[defType2] !== undefined ? chart[defType2] : 1);
  return eff;
}

// ═══════════════════════════════════════════════════
// DAMAGE CALCULATION (Gen 9+ / Champions formula)
// ═══════════════════════════════════════════════════
function calcDamage(atkStat, defStat, bp, level = 50) {
  return Math.floor(Math.floor(Math.floor(2 * level / 5 + 2) * bp * atkStat / defStat / 50) + 2);
}

function applyMod(val, mod) {
  // mod is in 0x1000 format (4096 = 1x)
  return Math.floor(val * mod / 4096);
}

function getWeatherMod(moveType, weather, item) {
  if (item === 'Utility Umbrella') return 1.0;
  if ((weather === 'Sun') && moveType === 'Fire') return 1.5;
  if ((weather === 'Sun') && moveType === 'Water') return 0.5;
  if ((weather === 'Rain') && moveType === 'Water') return 1.5;
  if ((weather === 'Rain') && moveType === 'Fire') return 0.5;
  return 1.0;
}

function getTerrainMod(moveType, terrain, isGrounded) {
  if (!isGrounded) return 1.0;
  const TERRAIN_BOOST = 1.3; // Gen 8+
  if ((terrain === 'Electric' && moveType === 'Electric') ||
      (terrain === 'Grassy' && moveType === 'Grass') ||
      (terrain === 'Psychic' && moveType === 'Psychic')) return TERRAIN_BOOST;
  return 1.0;
}

function getTerrainDefMod(moveName, moveType, terrain, defIsGrounded) {
  if (!defIsGrounded) return 1.0;
  if (terrain === 'Misty' && moveType === 'Dragon') return 0.5;
  if (terrain === 'Grassy' && (moveName === 'Earthquake' || moveName === 'Bulldoze')) return 0.5;
  return 1.0;
}

function getSTAB(moveType, t1, t2, ability) {
  if (moveType === t1 || moveType === t2) {
    return ability === 'Adaptability' ? 2.0 : 1.5;
  }
  return 1.0;
}

function getItemAtkMod(item, moveCategory) {
  if (item === 'Choice Band' && moveCategory === 'Physical') return 1.5;
  if (item === 'Choice Specs' && moveCategory === 'Special') return 1.5;
  if (item === 'Life Orb') return 1.3;
  return 1.0;
}

function getItemBPMod(item, moveType) {
  if (ITEM_TYPE_BOOST[item] === moveType) return 1.2;
  return 1.0;
}

function getAbilityAtkMod(ability, moveType, moveCategory) {
  const abilityBoosts = {
    'Blaze': ['Fire', 0.5, 1.5], // when HP < 1/3 - simplified: always apply
    'Torrent': ['Water', 0.5, 1.5],
    'Overgrow': ['Grass', 0.5, 1.5],
    'Swarm': ['Bug', 0.5, 1.5],
  };
  // Simplified: special offensive abilities
  if (ability === 'Aerilate' && moveType === 'Normal') return 1.2;
  if (ability === 'Pixilate' && moveType === 'Normal') return 1.2;
  if (ability === 'Refrigerate' && moveType === 'Normal') return 1.2;
  if (ability === 'Galvanize' && moveType === 'Normal') return 1.2;
  if (ability === 'Technician') return 1.0; // handled per-move
  if (ability === 'Iron Fist' && moveCategory === 'Physical') return 1.0; // simplified
  if (ability === 'Sheer Force') return 1.3; // simplified - always
  if (ability === 'Sand Force') return 1.0;
  return 1.0;
}

function getTechnicianBP(ability, bp) {
  return (ability === 'Technician' && bp <= 60) ? bp * 1.5 : bp;
}

function isGrounded(defData) {
  // Flying types and Levitate are not grounded
  if (defData.t1 === 'Flying' || defData.t2 === 'Flying') return false;
  if (defData.ab === 'Levitate') return false;
  return true;
}

// Main calc: returns best result among attacker's 4 selected moves
// overrideStats: { hp, df, sd, natPlus, natMinus, sp_hp, sp_df, sp_sd }
function calcBestMove(attacker, atkStats, defenderName, defenderData, overrideStats) {
  const defNatArr = overrideStats
    ? [overrideStats.natPlus || '', overrideStats.natMinus || '']
    : ['', ''];
  const spHP = (overrideStats && overrideStats.sp_hp != null) ? overrideStats.sp_hp : 0;
  const spDf = (overrideStats && overrideStats.sp_df != null) ? overrideStats.sp_df : 0;
  const spSd = (overrideStats && overrideStats.sp_sd != null) ? overrideStats.sp_sd : 0;

  const defHP   = calcHP(defenderData.bs.hp, spHP);
  const defDfOv = calcStat(defenderData.bs.df, spDf, defNatArr, 'df');
  const defSdOv = calcStat(defenderData.bs.sd, spSd, defNatArr, 'sd');

  const atkPokeData = POKE_DATA[getEffectivePokeName(attacker)];
  if (!atkPokeData) return null;

  const atkItem    = attacker.item || '';
  const atkAbility = attacker.ability || atkPokeData.ab || '';
  const defAbility = (overrideStats && overrideStats.ability) ? overrideStats.ability : (defenderData.ab || '');
  const defIsGrounded = isGrounded(defenderData);
  const atkT1 = atkPokeData.t1, atkT2 = atkPokeData.t2 || '';
  const defT1 = defenderData.t1, defT2 = defenderData.t2 || '';
  const defW = defenderData.w || 0;
  const atkW = atkPokeData.w || 0;

  const selectedMoves = attacker.moves.filter(function(m){ return m && MOVE_DATA[m]; });
  if (selectedMoves.length === 0) return null;

  var bestResult = null;

  for (var mi = 0; mi < selectedMoves.length; mi++) {
    var moveName = selectedMoves[mi];
    var md = MOVE_DATA[moveName];
    if (!md || !md.bp || md.bp <= 0) continue;
    if (!md.category || md.category === 'Status') continue;

    var bp = md.bp;
    var moveCat = md.category;
    var moveType = md.type;

    // ── TYPE CHANGE ───────────────────────────────────────────
    if (moveName === 'Weather Ball') {
      if      (weather === 'Sun')  { moveType = 'Fire';   bp = 100; }
      else if (weather === 'Rain') { moveType = 'Water';  bp = 100; }
      else if (weather === 'Sand') { moveType = 'Rock';   bp = 100; }
      else if (weather === 'Snow') { moveType = 'Ice';    bp = 100; }
    }
    if (moveName === 'Terrain Pulse') {
      if      (terrain === 'Electric') { moveType = 'Electric'; bp = 100; }
      else if (terrain === 'Grassy')   { moveType = 'Grass';    bp = 100; }
      else if (terrain === 'Misty')    { moveType = 'Fairy';    bp = 100; }
      else if (terrain === 'Psychic')  { moveType = 'Psychic';  bp = 100; }
    }
    var ateTypes = { 'Galvanize':'Electric', 'Aerilate':'Flying', 'Pixilate':'Fairy', 'Refrigerate':'Ice' };
    var ateBoost = false;
    if (ateTypes[atkAbility] && moveType === 'Normal') { moveType = ateTypes[atkAbility]; ateBoost = true; }

    // ── BP VARIABLES ──────────────────────────────────────────
    if (moveName === 'Low Kick' || moveName === 'Grass Knot') {
      bp = defW >= 200 ? 120 : defW >= 100 ? 100 : defW >= 50 ? 80 : defW >= 25 ? 60 : defW >= 10 ? 40 : 20;
    } else if (moveName === 'Heavy Slam' || moveName === 'Heat Crash') {
      var ratio = defW > 0 ? atkW / defW : 5;
      bp = ratio >= 5 ? 120 : ratio >= 4 ? 100 : ratio >= 3 ? 80 : ratio >= 2 ? 60 : 40;
    } else if (moveName === 'Gyro Ball') {
      bp = Math.min(150, Math.max(1, Math.floor(25 * (defenderData.bs.sp || 1) / (atkPokeData.bs.sp || 1))));
    } else if (moveName === 'Electro Ball') {
      var spRatio = Math.floor((atkPokeData.bs.sp || 1) / (defenderData.bs.sp || 1));
      bp = spRatio >= 4 ? 150 : spRatio >= 3 ? 120 : spRatio >= 2 ? 80 : spRatio >= 1 ? 60 : 40;
    } else if (moveName === 'Acrobatics') {
      bp = (atkItem === '' || atkItem === '(No Item)') ? 110 : 55;
    } else if (moveName === 'Knock Off') {
      bp = 97;
    } else if (moveName === 'Body Press') {
      moveCat = 'BodyPress';
    } else if (moveName === 'Psyshock' || moveName === 'Psystrike' || moveName === 'Secret Sword') {
      moveCat = 'PsyshockType';
    } else if (moveName === 'Foul Play') {
      continue;
    } else if (bp <= 1 && (md.isOHKO || md.usesOppMoves ||
        moveName === 'Seismic Toss' || moveName === 'Night Shade' ||
        moveName === 'Super Fang' || moveName === 'Final Gambit')) {
      continue;
    }

    // Context-dependent BP
    if (moveName === 'Rising Voltage'  && terrain === 'Electric' && defIsGrounded) bp *= 2;
    if (moveName === 'Expanding Force' && terrain === 'Psychic')  bp = Math.floor(bp * 1.5);
    if (moveName === 'Psyblade'        && terrain === 'Electric') bp = Math.floor(bp * 1.5);
    if ((moveName === 'Solar Beam' || moveName === 'Solar Blade') && weather !== 'Sun' && weather !== '') bp = Math.floor(bp / 2);

    // ── BP MODIFIERS ──────────────────────────────────────────
    var bpMult = 1.0;
    if (ateBoost)                                                           bpMult *= 1.2;
    if (atkAbility === 'Reckless'    && (md.hasRecoil || md.recoilHP || md.hasCrash)) bpMult *= 1.2;
    if (atkAbility === 'Iron Fist'   && md.isPunch)                        bpMult *= 1.2;
    if (atkAbility === 'Punk Rock'   && md.isSound)                        bpMult *= 1.3;
    if (atkAbility === 'Sheer Force' && md.hasSecondaryEffect)             bpMult *= 1.3;
    if (atkAbility === 'Sand Force'  && weather === 'Sand' && ['Rock','Ground','Steel'].indexOf(moveType) !== -1) bpMult *= 1.3;
    if (atkAbility === 'Tough Claws' && md.makesContact)                   bpMult *= 1.3;

    var techBP = bp * bpMult;
    if (atkAbility === 'Technician' && techBP <= 60) techBP *= 1.5;
    if (atkAbility === 'Strong Jaw' && md.isBite)    techBP *= 1.5;
    if (atkAbility === 'Mega Launcher' && md.isPulse) techBP *= 1.5;
    if (atkAbility === 'Steely Spirit' && moveType === 'Steel') techBP *= 1.5;
    if (atkAbility === 'Sharpness'   && md.isSlice)  techBP *= 1.5;
    bp = Math.floor(techBP);

    var bpItemMod = getItemBPMod(atkItem, moveType);
    bp = Math.floor(bp * bpItemMod);
    if ((atkItem === 'Muscle Band' && moveCat === 'Physical') ||
        (atkItem === 'Wise Glasses' && moveCat === 'Special')) bp = Math.floor(bp * 1.1);

    // Terrain
    if      (moveType === 'Electric' && terrain === 'Electric') bp = Math.floor(bp * 1.3);
    else if (moveType === 'Grass'    && terrain === 'Grassy')   bp = Math.floor(bp * 1.3);
    else if (moveType === 'Psychic'  && terrain === 'Psychic')  bp = Math.floor(bp * 1.3);
    if (terrain === 'Misty'  && moveType === 'Dragon' && defIsGrounded) bp = Math.floor(bp * 0.5);
    if (terrain === 'Grassy' && (moveName === 'Earthquake' || moveName === 'Bulldoze')) bp = Math.floor(bp * 0.5);

    // ── STATS ─────────────────────────────────────────────────
    var atkStatRaw, defStatRaw;
    if (moveCat === 'BodyPress') {
      atkStatRaw = atkStats.df; defStatRaw = defDfOv; moveCat = 'Physical';
    } else if (moveCat === 'PsyshockType') {
      atkStatRaw = atkStats.sa; defStatRaw = defDfOv; moveCat = 'Special';
    } else {
      atkStatRaw = moveCat === 'Physical' ? atkStats.at : atkStats.sa;
      defStatRaw = moveCat === 'Physical' ? defDfOv : defSdOv;
    }

    var atkBoostKey = moveCat === 'Physical' ? 'at' : 'sa';
    var atkBoostVal = attacker.boosts[atkBoostKey] || 0;
    var atkBoostMult = STAT_BOOST_MULTS[atkBoostVal > 0 ? '+'+atkBoostVal : ''+atkBoostVal] || 1;
    var atkStat = Math.floor(atkStatRaw * atkBoostMult);

    // ── ATTACK MODIFIERS ──────────────────────────────────────
    var atkMod = 1.0;
    if (atkItem === 'Choice Band'  && moveCat === 'Physical') atkMod *= 1.5;
    if (atkItem === 'Choice Specs' && moveCat === 'Special')  atkMod *= 1.5;
    if (atkItem === 'Life Orb')                               atkMod *= 1.3;
    if ((atkAbility === 'Huge Power' || atkAbility === 'Pure Power') && moveCat === 'Physical') atkMod *= 2;
    if (atkAbility === 'Water Bubble'  && moveType === 'Water')    atkMod *= 2;
    if (atkAbility === "Dragon's Maw"  && moveType === 'Dragon')   atkMod *= 1.5;
    if (atkAbility === 'Transistor'    && moveType === 'Electric')  atkMod *= 1.3;
    if (atkAbility === 'Solar Power'   && weather === 'Sun' && moveCat === 'Special') atkMod *= 1.5;
    if (atkAbility === 'Flash Fire'    && moveType === 'Fire')      atkMod *= 1.5;
    if (atkAbility === 'Hustle'        && moveCat === 'Physical')   atkStat = Math.floor(atkStat * 1.5);

    // ── DEFENSE MODIFIERS ─────────────────────────────────────
    var defMod = 1.0;
    if (defAbility === 'Thick Fat'       && (moveType === 'Fire' || moveType === 'Ice')) defMod *= 0.5;
    if (defAbility === 'Water Bubble'    && moveType === 'Fire')  defMod *= 0.5;
    if (defAbility === 'Purifying Salt'  && moveType === 'Ghost') defMod *= 0.5;
    if (defAbility === 'Heatproof'       && moveType === 'Fire')  defMod *= 0.5;
    if (defAbility === 'Fur Coat'        && moveCat === 'Physical') defMod *= 0.5;
    // Sandstorm SpD Rock, Snow DEF Ice
    if (weather === 'Sand' && (defT1 === 'Rock' || defT2 === 'Rock') && moveCat === 'Special')  defMod *= (1/1.5);
    if (weather === 'Snow' && (defT1 === 'Ice'  || defT2 === 'Ice')  && moveCat === 'Physical') defMod *= (1/1.5);

    // ── TYPE EFFECTIVENESS ────────────────────────────────────
    var typeEff = getTypeEff(moveType, defT1, defT2);
    if (typeEff === 0) continue;

    // ── FINAL MODS ────────────────────────────────────────────
    var finalMod = 1.0;
    if ((defAbility === 'Filter' || defAbility === 'Solid Rock' || defAbility === 'Prism Armor') && typeEff > 1) finalMod *= 0.75;
    if (defAbility === 'Multiscale' || defAbility === 'Shadow Shield') finalMod *= 0.5;
    if (defAbility === 'Fluffy') {
      if (md.makesContact) finalMod *= 0.5;
      if (moveType === 'Fire') finalMod *= 2;
    }
    if (defAbility === 'Punk Rock' && md.isSound) finalMod *= 0.5;
    if (defAbility === 'Ice Scales' && moveCat === 'Special') finalMod *= 0.5;
    if (atkItem === 'Expert Belt' && typeEff > 1)  finalMod *= 1.2;
    if (atkAbility === 'Tinted Lens' && typeEff < 1) finalMod *= 2;
    if (atkAbility === 'Neuroforce'  && typeEff > 1) finalMod *= 1.25;

    // ── STAB ──────────────────────────────────────────────────
    var stab = getSTAB(moveType, atkT1, atkT2, atkAbility);

    // ── DAMAGE ────────────────────────────────────────────────
    var modifiedAtk = Math.floor(atkStat * atkMod);
    var modifiedDef = Math.floor(defStatRaw * defMod);
    var baseDmg = calcDamage(modifiedAtk, modifiedDef, bp);

    // Spread ×0.75 en doubles (avant random)
    if (md.isSpread) baseDmg = Math.floor(baseDmg * 0.75);

    // Ordre officiel Pokémon Gen 8+ (source NCP damage_MASTER.js) :
    // spread → weather (pokeRound, AVANT random) → random → STAB (pokeRound)
    // → typeEff (Math.floor) → finalMod (pokeRound)
    var weatherMod = getWeatherMod(moveType, weather, atkItem);
    if (weatherMod !== 1.0) {
      baseDmg = pokeRound(baseDmg * (weatherMod === 1.5 ? 0x1800 : 0x800) / 0x1000);
    }

    function applyMods(d) {
      d = pokeRound(d * stab);
      d = Math.floor(d * typeEff);
      d = pokeRound(d * finalMod);
      return Math.max(1, d);
    }

    var minDmg = applyMods(Math.floor(baseDmg * 85 / 100));
    var maxDmg = applyMods(baseDmg);
    var minPct = (minDmg / defHP) * 100;
    var maxPct = (maxDmg / defHP) * 100;

    if (!bestResult || maxPct > bestResult.maxPct) {
      bestResult = { moveName: moveName, moveType: moveType, moveCat: moveCat, minPct: minPct, maxPct: maxPct, typeEff: typeEff, defHP: defHP, minDmg: minDmg, maxDmg: maxDmg };
    }
  }

  return bestResult;
}

// UI — TEAM SLOTS

const STAT_KEYS = ['hp','at','df','sa','sd','sp'];
const STAT_LABELS = ['HP','ATK','DEF','SpA','SpD','SPE'];

// Build move options HTML once (reused for all slots)
const MOVE_OPTIONS_HTML = '<option value="">(Aucun)</option>' +
  OFFENSIVE_MOVE_NAMES.map(n => `<option value="${n}">${n}</option>`).join('');

function getMoveTypeDotColor(moveName) {
  if (!moveName) return 'var(--muted)';
  const md = MOVE_DATA[moveName];
  return md ? `var(--${md.type})` : 'var(--muted)';
}

function renderTeamSlots() {
  const container = document.getElementById('teamSlots');
  container.innerHTML = '';
  team.forEach((slot, i) => {
    const card = document.createElement('div');
    card.className = 'pokemon-card' + (selectedSlot === i ? ' selected' : '');
    card.id = `slot-${i}`;
    card.addEventListener('click', (e) => {
      if (e.target.tagName === 'SELECT' || e.target.tagName === 'INPUT') return;
      selectSlot(i);
    });

    const effectiveName = getEffectivePokeName(slot);
    const pokeData = effectiveName ? POKE_DATA[effectiveName] : null;
    const t1 = pokeData ? pokeData.t1 : '';
    const t2 = pokeData ? pokeData.t2 : '';

    // Mega forme selector
    const megaOptions = slot.pokemon ? getMegaOptions(slot.pokemon) : null;
    const megaBarHtml = megaOptions ? (() => {
      const megas = Object.keys(megaOptions);
      const btns = megas.map(mf => {
        const stone = megaOptions[mf];
        const active = slot.megaForme === mf ? ' active' : '';
        return `<button class="mega-btn${active}" onclick="selectMega(${i},'${mf}','${stone}');event.stopPropagation()">${mf}</button>`;
      }).join('');
      const stoneTag = '';
      return `<div class="mega-bar">
        <span class="mega-label">Forme.s</span>
        <button class="mega-btn${slot.megaForme ? '' : ' active'}" onclick="selectMega(${i},'','');event.stopPropagation()">Base</button>
        ${btns}
        ${stoneTag}
      </div>`;
    })() : '';

    // Move options: si données CC disponibles → uniquement les moves appris (usageMoves), triés par usage
    // Sinon → liste complète OFFENSIVE_MOVE_NAMES
    const ccMoveData = slot.ccMoves; // array of {move:{name,...}, percent} ou null
    const movePercent = {};
    var movePool;
    if (ccMoveData && ccMoveData.length > 0) {
      ccMoveData.forEach(function(m) { movePercent[m.move.name] = m.percent; });
      // Filtrer aux moves offensifs uniquement (qui existent dans notre MOVE_DATA)
      movePool = ccMoveData
        .filter(function(m) { return MOVE_DATA[m.move.name] && MOVE_DATA[m.move.name].bp > 0 && MOVE_DATA[m.move.name].category !== 'Status'; })
        .map(function(m) { return m.move.name; });
    } else {
      movePool = OFFENSIVE_MOVE_NAMES;
    }

    // Item options: CC items first with %, then remaining
    const ccItemsData = slot.ccItems;
    const ccItemNames = ccItemsData ? ccItemsData.map(function(it) { return it.item.name; }) : null;
    const itemPercent = {};
    if (ccItemsData) ccItemsData.forEach(function(it) { itemPercent[it.item.name] = it.percent; });
    const itemOptions = ccItemNames
      ? ['(No Item)'].concat(ccItemNames).concat(ITEM_DATA.filter(function(it) { return !ccItemNames.includes(it); }))
      : ['(No Item)'].concat(ITEM_DATA);

    // Inject selected attribute into move options
    const moveSelectors = slot.moves.map((mv, mi) => {
      const opts = '<option value="">(Aucun)</option>' +
        movePool.map(n => {
          const pct = movePercent[n] != null ? ` (${Math.floor(movePercent[n]*10)/10}%)` : '';
          return `<option value="${n}"${n===mv?' selected':''}>${n}${pct}</option>`;
        }).join('');
      const dotColor = getMoveTypeDotColor(mv);
      return `<div class="move-slot">
        <span class="move-type-dot" id="mdot-${i}-${mi}" style="background:${dotColor}"></span>
        <select onchange="updateMove(${i},${mi},this.value)" onclick="event.stopPropagation()">${opts}</select>
      </div>`;
    }).join('');

    const isMega = !!slot.megaForme;
    const lockedAttr = isMega ? ' disabled style="opacity:0.45;cursor:not-allowed"' : '';

    card.innerHTML = `
      <div class="card-header">
        <span class="slot-num">#${i+1}</span>
        <span class="poke-name-display">${effectiveName || '<span class="poke-placeholder">— Vide —</span>'}</span>
        ${t1 ? `<span class="type-badge" style="background:var(--${t1})">${t1}</span>` : ''}
        ${t2 ? `<span class="type-badge" style="background:var(--${t2})">${t2}</span>` : ''}
      </div>
      ${megaBarHtml}
      <div class="card-selects">
        <div class="card-selects-full">
          <select onchange="updateSlot(${i},'pokemon',this.value)" onclick="event.stopPropagation()">
            <option value="">-- Choisir un Pokémon --</option>
            ${Object.keys(POKE_DATA).sort().map(n => `<option value="${n}" ${n===slot.pokemon?'selected':''}>${n}</option>`).join('')}
          </select>
        </div>
        <select${lockedAttr} onchange="updateSlot(${i},'ability',this.value)" onclick="event.stopPropagation()">
          <option value="">-- Talent --</option>
          ${(() => {
            const filtered = getAbilitiesFor(effectiveName);
            const list = filtered || ABILITY_DATA;
            return list.map(a => `<option value="${a}" ${a===slot.ability?'selected':''}>${a}</option>`).join('');
          })()}
        </select>
        <select${lockedAttr} onchange="updateSlot(${i},'item',this.value)" onclick="event.stopPropagation()">
          ${itemOptions.map(it => {
            const pct = itemPercent[it] != null ? ` (${Math.floor(itemPercent[it]*10)/10}%)` : '';
            return `<option value="${it}"${it===slot.item?' selected':''}>${it === '(No Item)' ? '(Aucun objet)' : it + pct}</option>`;
          }).join('')}
        </select>
        <select class="stat-boost-sel${slot.natPlus ? ' boosted' : ''}" id="natplus-${i}" onchange="updateSlot(${i},'natPlus',this.value)" onclick="event.stopPropagation()">
          <option value="">(Neutre)</option>
          ${NATURE_STATS.map(s => `<option value="${s}"${s===slot.natPlus?' selected':''}>${NATURE_STAT_LABELS[s]} +10%</option>`).join('')}
        </select>
        <select class="stat-boost-sel${slot.natMinus ? ' dropped' : ''}" id="natminus-${i}" onchange="updateSlot(${i},'natMinus',this.value)" onclick="event.stopPropagation()">
          <option value="">(Neutre)</option>
          ${NATURE_STATS.map(s => `<option value="${s}"${s===slot.natMinus?' selected':''}>${NATURE_STAT_LABELS[s]} -10%</option>`).join('')}
        </select>
      </div>
      <div class="moves-label">Attaques</div>
      <div class="moves-grid">${moveSelectors}</div>
      <div class="stats-grid" id="stats-${i}">
        ${(() => {
          // Données de la forme de base pour comparaison (si mega active)
          const basePokeData = (slot.megaForme && slot.pokemon) ? POKE_DATA[slot.pokemon] : null;
          return STAT_KEYS.map((sk, si) => {
            const baseVal = pokeData ? (pokeData.bs[sk] || 0) : 0;
            const computed = pokeData ? (sk==='hp' ? calcHP(baseVal, slot.sps[sk]) : calcStat(baseVal, slot.sps[sk], [slot.natPlus||'', slot.natMinus||''], sk)) : '—';
            const boost = sk !== 'hp' ? (slot.boosts[sk] || 0) : null;
            const boostKey = boost === null ? null : (boost > 0 ? `+${boost}` : `${boost}`);
            const boostClass = boost > 0 ? 'boosted' : boost < 0 ? 'dropped' : '';
            const boostSel = sk !== 'hp' ? `
              <select class="stat-boost-sel ${boostClass}" id="boost-${i}-${sk}"
                onchange="updateBoost(${i},'${sk}',this.value)" onclick="event.stopPropagation()">
                ${BOOST_OPTIONS.map(v => `<option value="${v}"${v===(boostKey||'0')?' selected':''}>${v==='0'?'±0':v}</option>`).join('')}
              </select>` : `<span style="font-size:9px;color:transparent">—</span>`;
            // Couleur de stat-total selon comparaison base vs mega
            let statTotalColor = '';
            if (basePokeData) {
              const baseStatVal = basePokeData.bs[sk] || 0;
              if (baseVal > baseStatVal) statTotalColor = 'color:var(--success)';
              else if (baseVal < baseStatVal) statTotalColor = 'color:var(--danger)';
            }
            return `<div class="stat-item">
              <span class="stat-label">${STAT_LABELS[si]}</span>
              <div class="sp-spinner">
                <button class="sp-btn" onclick="stepSP(${i},'${sk}',1);event.stopPropagation()">▲</button>
                <span class="stat-val" id="spval-${i}-${sk}"
                  contenteditable="true"
                  onblur="commitSP(${i},'${sk}',this)"
                  onkeydown="if(event.key==='Enter'){this.blur();event.preventDefault()}"
                  onclick="event.stopPropagation()"
                >${slot.sps[sk]}</span>
                <button class="sp-btn" onclick="stepSP(${i},'${sk}',-1);event.stopPropagation()">▼</button>
              </div>
              <span class="stat-total" id="stattot-${i}-${sk}" style="${statTotalColor}">${computed}</span>
              <span class="stat-sp-label">SP</span>
              ${boostSel}
            </div>`;
          }).join('');
        })()}
      </div>
    `;
    container.appendChild(card);
  });
}

function updateMove(slotIdx, moveIdx, value) {

  // Update dot color without full re-render
  const dot = document.getElementById(`mdot-${slotIdx}-${moveIdx}`);

function selectMega(i, megaForme, stone) {

}

// IDs Coup Critique par nom de Pokémon (source: /api/tiers/220)
const CC_IDS = {"Incineroar":7952,"Sneasler":7204,"Garchomp":7050,"Sinistcha":8040,"Kingambit":7276,"Basculegion":7207,"Whimsicott":7866,"Charizard":6946,"Floette-Eternal":7568,"Rotom-Wash":7054,"Pelipper":7007,"Tyranitar":7010,"Dragonite":6981,"Archaludon":8052,"Gengar":6961,"Aerodactyl":7725,"Farigiraf":7217,"Venusaur":7655,"Maushold":6924,"Froslass":7053,"Milotic":7445,"Excadrill":7864,"Gardevoir":7013,"Corviknight":7172,"Talonflame":7115,"Kommo-o":7980,"Delphox":7108,"Primarina":7955,"Palafin":6914,"Politoed":7365,"Torkoal":6727,"Clefable":7309,"Aegislash":7921,"Gyarados":6972,"Glimmora":7239,"Ninetales-Alola":7680,"Dragapult":7190,"Arcanine-Hisui":6953,"Meganium":7357,"Sylveon":6838,"Kangaskhan":7339,"Scizor":6996,"Rotom-Heat":7060,"Volcarona":7097,"Golurk":7899,"Typhlosion-Hisui":6977,"Starmie":7717,"Hydreigon":7093,"Orthworm":6930,"Aggron":7788,"Lucario":7051,"Scovillain":7227,"Meowscarada":7211,"Arcanine":6678,"Sableye":7017,"Hatterene":7185,"Gallade":7049,"Mamoswine":7851,"Raichu":6655,"Drampa":7975,"Crabominable":7154,"Oranguru":7163,"Mimikyu":7166,"Blastoise":7282,"Vivillon":7105,"Zoroark-Hisui":7079,"Azumarill":6978,"Feraligatr":7359,"Tsareena":6854,"Tinkaton":7263,"Manectric":7433,"Greninja":7134,"Altaria":7026,"Araquanid":7959,"Chesnaught":7098,"Meowstic":7586,"Camerupt":7020,"Hawlucha":7140,"Conkeldurr":7535,"Weavile":7047,"Garganacl":6936,"Empoleon":7824,"Skarmory":7755,"Lopunny":7485,"Klefki":7152,"Lycanroc-Midday":6853,"Snorlax":7350,"Goodra-Hisui":7145,"Armarouge":7264,"Chandelure":7894,"Pikachu":6661,"Slowbro":6957,"Rotom-Frost":7056,"Tauros-Paldea-Aqua":6989,"Rotom-Mow":7055,"Quaquaval":7216,"Ampharos":6703,"Ceruledge":7280,"Kleavor":7210,"Abomasnow":7052,"Maushold-Four":6924,"Aegislash-Shield":7921,"Aegislash-Blade":7921,"Basculegion-F":7207,"Palafin-Hero":6914};

// Cache des données Champions fetchées dynamiquement
// CC_CACHE[id] = { data: usageObj|null, ready: true } quand disponible
const CC_CACHE = {};

function getCCId(pokeName) {
  var baseName = pokeName;
  if (pokeName && pokeName.startsWith('Mega ')) {
    for (var k in MEGA_MAP) { if (MEGA_MAP[k][pokeName] !== undefined) { baseName = k; break; } }
  }
  return CC_IDS[baseName] || CC_IDS[pokeName] || null;
}

function getCCData(pokeName) {
  var id = getCCId(pokeName);
  if (!id) return null;
  var entry = CC_CACHE[id];
  return (entry && entry.ready) ? entry.data : undefined; // undefined = pas encore prêt
}

function fetchCC(id) {
  if (CC_CACHE[id] && CC_CACHE[id].ready) return Promise.resolve(CC_CACHE[id].data);
  if (CC_CACHE[id] && CC_CACHE[id].promise) return CC_CACHE[id].promise;
  var promise = fetch('https://www.coupcritique.fr/api/pokemons/' + id)
    .then(function(r) { return r.json(); })
    .then(function(json) {
      var usage = null;
      if (json.pokemon && json.pokemon.usages) {
        usage = json.pokemon.usages.find(function(u) { return u.provider === 'champions'; });
      }
      CC_CACHE[id] = { ready: true, data: usage || null };
      return CC_CACHE[id].data;
    })
    .catch(function() {
      CC_CACHE[id] = { ready: true, data: null };
      return null;
    });
  CC_CACHE[id] = { ready: false, promise: promise };
  return promise;
}

function updateSlot(i, field, value) {
  team[i][field] = value;
  if (field === 'pokemon') {
    var pd = POKE_DATA[value];
    var filteredAbs = getAbilitiesFor(value);
    team[i].ability   = filteredAbs ? filteredAbs[0] : (pd ? pd.ab : '');
    team[i].sps       = { at:0, df:0, sa:0, sd:0, sp:0, hp:0 };
    team[i].boosts    = { at:0, df:0, sa:0, sd:0, sp:0 };
    team[i].natPlus   = '';
    team[i].natMinus  = '';
    team[i].megaForme = '';
    team[i].ccMoves   = null;
    team[i].ccItems   = null;
    team[i].moves     = ['','','',''];
    team[i].item      = '(No Item)';

    if (value) {
      var id = getCCId(value);
      if (id) {
        var entry = CC_CACHE[id];
        if (entry && entry.ready) {
          // Cache prêt : appliquer immédiatement avant le render
          var data = entry.data;
          team[i].ccMoves = data ? (data.usageMoves || null) : null;
          team[i].ccItems = data ? (data.usageItems || null) : null;
        } else {
          // Pas encore prêt : déclencher un fetch, re-render au retour
          fetchCC(id).then(function(data) {
            if (team[i].pokemon !== value) return;
            team[i].ccMoves = data ? (data.usageMoves || null) : null;
            team[i].ccItems = data ? (data.usageItems || null) : null;
            renderTeamSlots();
            if (selectedSlot === i) runCalc();
          });
        }
      }
    }
  }
  if (field === 'natPlus'  && value && value === team[i].natMinus) team[i].natMinus = '';
  if (field === 'natMinus' && value && value === team[i].natPlus)  team[i].natPlus  = '';
  renderTeamSlots();
  if (selectedSlot === i) runCalc();
}

function updateBoost(i, stat, val) {
  const numVal = val === '0' ? 0 : parseInt(val);
  team[i].boosts[stat] = numVal;
  // Update select color class without full re-render
  const sel = document.getElementById(`boost-${i}-${stat}`);
  if (sel) {
    sel.className = 'stat-boost-sel' + (numVal > 0 ? ' boosted' : numVal < 0 ? ' dropped' : '');
  }
  if (selectedSlot === i) debouncedCalc();
}

function stepSP(i, stat, delta) {
  const cur = team[i].sps[stat] || 0;
  const next = Math.max(0, Math.min(32, cur + delta));
  if (next === cur) return;
  team[i].sps[stat] = next;
  const spEl = document.getElementById(`spval-${i}-${stat}`);
  const totEl = document.getElementById(`stattot-${i}-${stat}`);
  if (spEl) spEl.textContent = next;
  if (totEl) {
    const pd = POKE_DATA[getEffectivePokeName(team[i])];
    if (pd) {
      const base = pd.bs[stat] || 0;
      const nat = [team[i].natPlus||'', team[i].natMinus||''];
      totEl.textContent = stat === 'hp' ? calcHP(base, next) : calcStat(base, next, nat, stat);
    }
  }
  if (selectedSlot === i) debouncedCalc();
}

function commitSP(i, stat, el) {
  const val = Math.max(0, Math.min(32, parseInt(el.textContent) || 0));
  el.textContent = val;
  team[i].sps[stat] = val;
  const totEl = document.getElementById(`stattot-${i}-${stat}`);
  if (totEl) {
    const pd = POKE_DATA[getEffectivePokeName(team[i])];
    if (pd) {
      const base = pd.bs[stat] || 0;
      const nat = [team[i].natPlus||'', team[i].natMinus||''];
      totEl.textContent = stat === 'hp' ? calcHP(base, val) : calcStat(base, val, nat, stat);
    }
  }
  if (selectedSlot === i) debouncedCalc();
}

function selectSlot(i) {
  selectedSlot = i;
  document.querySelectorAll('.pokemon-card').forEach((el, j) => {
    el.classList.toggle('selected', j === i);
  });
  runCalc();
}

// ═══════════════════════════════════════════════════
// DEBOUNCE
// ═══════════════════════════════════════════════════
let calcTimer = null;
function debouncedCalc() {
  clearTimeout(calcTimer);
  calcTimer = setTimeout(runCalc, 150);
}

// ═══════════════════════════════════════════════════
// MAIN CALC
// ═══════════════════════════════════════════════════
function runCalc() {
  const slot = selectedSlot;
  if (slot === null) return;
  const attacker = team[slot];
  if (!attacker.pokemon) {
    document.getElementById('noSelection').style.display = 'flex';
    document.getElementById('resultsContent').style.display = 'none';
    return;
  }

  const effectiveName = getEffectivePokeName(attacker);
  const atkPokeData = POKE_DATA[effectiveName];
  if (!atkPokeData) return;

  const atkStats = getStats(atkPokeData, attacker.sps, attacker.natPlus, attacker.natMinus);

  document.getElementById('noSelection').style.display = 'none';
  document.getElementById('resultsContent').style.display = 'block';
  document.getElementById('resultsTitle').textContent = effectiveName;

  const natText = (attacker.natPlus || attacker.natMinus)
    ? `+${NATURE_STAT_LABELS[attacker.natPlus]||'—'} / -${NATURE_STAT_LABELS[attacker.natMinus]||'—'}`
    : 'Neutre';
  const validMoves = attacker.moves.filter(m => m && MOVE_DATA[m]);
  document.getElementById('resultsSubtitle').textContent =
    `${attacker.ability || atkPokeData.ab} · ${attacker.item || 'Sans objet'} · ${natText} · ${validMoves.length > 0 ? validMoves.join(' / ') : '⚠ Aucune attaque sélectionnée'}`;

  // If no moves, show empty state
  if (validMoves.length === 0) {
    tableData = [];
    document.getElementById('tableBody').innerHTML = `<tr><td colspan="5" style="color:var(--muted);font-family:'IBM Plex Mono',monospace;padding:20px;text-align:center">Sélectionnez au moins une attaque pour calculer les dégâts.</td></tr>`;
    return;
  }

  // Calculate vs all 277 pokemon
  tableData = [];
  const defNat = NATURE_DATA['Hardy'] || ['',''];
  for (const [defName, defData] of Object.entries(POKE_DATA)) {
    if (!defData || !defData.bs) continue;
    const override = advStats[defName] || {};
    const result = calcBestMove(attacker, atkStats, defName, defData, override);
    if (!result) continue;
    // Store base def stats for input defaults
    const baseDF = calcStat(defData.bs.df, 0, defNat, 'df');
    const baseSD = calcStat(defData.bs.sd, 0, defNat, 'sd');
    const baseHP = calcHP(defData.bs.hp, 0);
    tableData.push({
      name: defName,
      type: defData.t1 + (defData.t2 ? `/${defData.t2}` : ''),
      t1: defData.t1,
      t2: defData.t2 || '',
      move: result.moveName,
      movetype: result.moveType,
      moveCat: result.moveCat,
      minPct: result.minPct,
      maxPct: result.maxPct,
      typeEff: result.typeEff,
      isOHKO: result.minPct >= 100,
      isPotentialKO: result.maxPct >= 100 && result.minPct < 100,
      baseHP, baseDF, baseSD,
      spHP:  advStats[defName]?.sp_hp  ?? 0,
      spDf:  advStats[defName]?.sp_df  ?? 0,
      spSd:  advStats[defName]?.sp_sd  ?? 0,
      advNatPlus:  advStats[defName]?.natPlus  || '',
      advNatMinus: advStats[defName]?.natMinus || '',
      advAbility:  advStats[defName]?.ability  || '',
      defStatKey: result.moveCat === 'Physical' ? 'df' : 'sd',
    });
  }

  renderResults();
}

// ═══════════════════════════════════════════════════
// RENDER RESULTS
// ═══════════════════════════════════════════════════
function renderResults() {
  renderSummary();
  renderTable();
}

function renderSummary() {
  const ohkos = tableData.filter(r => r.isOHKO).sort((a,b) => b.maxPct - a.maxPct);
  const top = [...tableData].sort((a,b) => b.maxPct - a.maxPct).slice(0, 10);

  const ohkoEl = document.getElementById('ohkoList');
  const topEl = document.getElementById('topDmgList');

  if (ohkos.length === 0) {
    ohkoEl.innerHTML = `<div style="color:var(--muted);font-size:13px;padding:8px;font-family:'IBM Plex Mono',monospace">Aucun OHKO garanti avec ces paramètres.</div>`;
  } else {
    ohkoEl.innerHTML = renderSummaryCard('Top OHKO', ohkos.slice(0, 5), true);
  }

  topEl.innerHTML = renderSummaryCard('Top Dégâts', top.slice(0, 5), false);
}

function renderSummaryCard(title, rows, isOHKO) {
  if (rows.length === 0) return '';
  return rows.map((r, i) => {
    const pct = r.maxPct;
    const barPct = Math.min(pct, 200);
    const barClass = r.isOHKO ? 'ohko' : r.isPotentialKO ? 'ko' : '';
    const pctClass = r.isOHKO ? 'ohko' : r.isPotentialKO ? 'ko' : '';
    return `<div class="summary-card">
      <div class="summary-item">
        <span class="summary-rank">${i+1}</span>
        <span class="summary-poke">${r.name}</span>
        <span class="pct-text ${pctClass}">${r.minPct.toFixed(0)}–${r.maxPct.toFixed(0)}%</span>
      </div>
      <div class="summary-item" style="border:none;padding-top:2px">
        <span class="type-dot" style="background:var(--${r.movetype})"></span>
        <span class="summary-move">${r.move}</span>
      </div>
      <div class="dmg-bar-wrap">
        <div class="dmg-bar ${barClass}" style="width:${Math.min(barPct/2,100)}%"></div>
      </div>
    </div>`;
  }).join('');
}

function natOptsFor(sel, suffix) {
  var opts = '<option value=""' + (sel === '' ? ' selected' : '') + '>(Neutre)</option>';
  NATURE_STATS.forEach(function(s) {
    opts += '<option value="' + s + '"' + (s === sel ? ' selected' : '') + '>' + NATURE_STAT_LABELS[s] + ' ' + suffix + '</option>';
  });
  return opts;
}

function typeDotsHtml(t1, t2) {
  var h = '<span class="type-dot" style="background:var(--' + t1 + ')"></span>' + t1;
  if (t2) h += '<span class="type-dot" style="background:var(--' + t2 + ');margin-left:4px"></span>' + t2;
  return h;
}

function defSpinner(safeName, statKey, label, spVal) {
  return '<div class="def-spinner">'
    + '<span class="def-spinner-label">' + label + '</span>'
    + '<button class="def-sp-btn" onclick="stepAdvStat(event,\'' + safeName + '\',\'' + statKey + '\',1)">▲</button>'
    + '<span class="def-sp-val" id="adv-' + statKey + '-' + safeName + '"'
    + ' contenteditable="true"'
    + ' onblur="commitAdvStat(event,\'' + safeName + '\',\'' + statKey + '\',this)"'
    + ' onkeydown="if(event.key===\'Enter\'){this.blur();event.preventDefault()}"'
    + ' onclick="event.stopPropagation()"'
    + '>' + spVal + '</span>'
    + '<button class="def-sp-btn" onclick="stepAdvStat(event,\'' + safeName + '\',\'' + statKey + '\',-1)">▼</button>'
    + '</div>';
}

function renderTable() {
  sortTableData();
  var filtered = getFilteredData();
  var tbody = document.getElementById('tableBody');
  var html = '';
  filtered.forEach(function(r) {
    var rowBg      = r.isOHKO ? 'ohko-row' : r.isPotentialKO ? 'ko-row' : '';
    var badge      = r.isOHKO ? '<span class="ko-badge ohko">OHKO</span>'
                   : r.isPotentialKO ? '<span class="ko-badge ko">KO?</span>' : '';
    var pctClass   = r.isOHKO ? 'ohko' : r.isPotentialKO ? 'ko' : '';
    var defLabel   = r.defStatKey === 'df' ? 'DEF' : 'SpD';
    var spDefVal   = r.defStatKey === 'df' ? r.spDf : r.spSd;
    var natPlusClass  = r.advNatPlus  ? 'boosted' : '';
    var natMinusClass = r.advNatMinus ? 'dropped'  : '';
    var safeName   = r.name;

    var usagePct = USAGE_MAP[r.name] !== undefined
      ? '<span style="font-size:10px;color:var(--muted);font-family:\'IBM Plex Mono\',monospace;margin-left:5px">' + USAGE_MAP[r.name].toFixed(1) + '%</span>'
      : '';

    // Row 1: main info
    html += '<tr class="mainrow ' + rowBg + '">';
    html += '<td><strong>' + r.name + '</strong>' + badge + usagePct + '</td>';
    html += '<td>' + typeDotsHtml(r.t1, r.t2) + '</td>';
    html += '<td><span class="type-dot" style="background:var(--' + r.movetype + ')"></span>' + r.move + '</td>';
    html += '<td class="pct-text ' + pctClass + '">' + (Math.floor(r.minPct * 10) / 10).toFixed(1) + '%</td>';
    html += '<td class="pct-text ' + pctClass + '">' + (Math.floor(r.maxPct * 10) / 10).toFixed(1) + '%</td>';
    html += '</tr>';

    // Row 2: controls
    html += '<tr class="subrow ' + rowBg + '">';
    html += '<td colspan="5"><div class="subrow-controls">';

    // Ability selector
    var defAbilities = getAbilitiesFor(r.name) || [];
    if (defAbilities.length > 0) {
      var abOpts = '<option value="">(Défaut)</option>';
      defAbilities.forEach(function(ab) {
        abOpts += '<option value="' + ab + '"' + (ab === r.advAbility ? ' selected' : '') + '>' + ab + '</option>';
      });
      html += '<select class="adv-nat-sel' + (r.advAbility ? ' boosted' : '') + '"'
            + ' onchange="updateAdvAbility(\'' + r.name + '\',this.value)"'
            + ' onclick="event.stopPropagation()">'
            + abOpts + '</select>';
    }

    html += defSpinner(safeName, 'hp', 'HP', r.spHP);
    html += defSpinner(safeName, r.defStatKey, defLabel, spDefVal);
    html += '<select class="adv-nat-sel ' + natPlusClass + '"'
          + ' onchange="updateAdvNature(\'' + safeName + '\',\'natPlus\',this.value)"'
          + ' onclick="event.stopPropagation()">'
          + natOptsFor(r.advNatPlus, '+10%') + '</select>';
    html += '<select class="adv-nat-sel ' + natMinusClass + '"'
          + ' onchange="updateAdvNature(\'' + safeName + '\',\'natMinus\',this.value)"'
          + ' onclick="event.stopPropagation()">'
          + natOptsFor(r.advNatMinus, '-10%') + '</select>';
    html += '</div></td></tr>';
  });
  tbody.innerHTML = html;
}

function sortTableData() {
  tableData.sort(function(a, b) {
    if (sortKey === 'usage') {
      var ua = USAGE_MAP[a.name] !== undefined ? USAGE_MAP[a.name] : -1;
      var ub = USAGE_MAP[b.name] !== undefined ? USAGE_MAP[b.name] : -1;
      return ub - ua; // décroissant par défaut
    }
    var av = a[sortKey], bv = b[sortKey];
    if (typeof av === 'string') { av = av.toLowerCase(); bv = bv.toLowerCase(); }
    if (av < bv) return sortAsc ? -1 : 1;
    if (av > bv) return sortAsc ? 1 : -1;
    return 0;
  });
}

function setSortMode(mode) {
  sortKey = mode === 'damage' ? 'maxPct' : 'usage';
  sortAsc = false;
  document.getElementById('sortByUsageBtn').classList.toggle('active', mode === 'usage');
  document.getElementById('sortByDmgBtn').classList.toggle('active', mode === 'damage');
  renderTable();
}

function sortTable(key) {
  if (sortKey === key) sortAsc = !sortAsc;
  else { sortKey = key; sortAsc = false; }
  // Update header highlights
  document.querySelectorAll('.damage-table th').forEach(th => th.classList.remove('sorted'));
  event.target.classList.add('sorted');
  renderTable();
}

function filterTable() {
  renderTable();
}

function getFilteredData() {
  const search = (document.getElementById('filterInput')?.value || '').toLowerCase();
  const typeF = document.getElementById('filterType')?.value || '';
  const koF = document.getElementById('filterKO')?.value || '';
  const showLowUsage = document.getElementById('toggleLowUsage')?.checked || false;
  return tableData.filter(r => {
    if (!showLowUsage) {
      const usage = USAGE_MAP[r.name];
      if (usage === undefined || usage <= USAGE_THRESHOLD) return false;
    }
    if (search && !r.name.toLowerCase().includes(search)) return false;
    if (typeF && r.t1 !== typeF && r.t2 !== typeF) return false;
    if (koF === 'ohko' && !r.isOHKO) return false;
    if (koF === 'ko' && !r.isPotentialKO && !r.isOHKO) return false;
    return true;
  });
}

function stepAdvStat(e, pokeName, statKey, delta) {
  e.stopPropagation();
  if (!advStats[pokeName]) advStats[pokeName] = {};
  const spKey = 'sp_' + statKey;
  const curSP = advStats[pokeName][spKey] ?? 0;
  const nextSP = Math.max(0, Math.min(32, curSP + delta));
  advStats[pokeName][spKey] = nextSP;
  const el = document.getElementById(`adv-${statKey}-${pokeName}`);
  if (el) el.textContent = nextSP;
  _recomputeRow(pokeName);
}

function commitAdvStat(e, pokeName, statKey, el) {
  e.stopPropagation();
  const spVal = Math.max(0, Math.min(32, parseInt(el.textContent) || 0));
  el.textContent = spVal;
  if (!advStats[pokeName]) advStats[pokeName] = {};
  advStats[pokeName]['sp_' + statKey] = spVal;
  _recomputeRow(pokeName);
}

function updateAdvAbility(pokeName, value) {
  if (!advStats[pokeName]) advStats[pokeName] = {};
  advStats[pokeName].ability = value;
  _recomputeRow(pokeName);
}

function updateAdvNature(pokeName, field, value) {
  if (!advStats[pokeName]) advStats[pokeName] = {};
  advStats[pokeName][field] = value;
  // Prevent same stat in both nature slots
  const other = field === 'natPlus' ? 'natMinus' : 'natPlus';
  if (value && advStats[pokeName][other] === value) advStats[pokeName][other] = '';
  _recomputeRow(pokeName);
}

function _recomputeRow(pokeName) {
  const slot = selectedSlot;
  if (slot === null) return;
  const attacker = team[slot];
  const atkPokeData = POKE_DATA[getEffectivePokeName(attacker)];
  if (!atkPokeData) return;
  const atkStats = getStats(atkPokeData, attacker.sps, attacker.natPlus, attacker.natMinus);
  const defData = POKE_DATA[pokeName];
  if (!defData) return;
  const override = advStats[pokeName] || {};
  const result = calcBestMove(attacker, atkStats, pokeName, defData, override);
  if (!result) return;
  const row = tableData.find(r => r.name === pokeName);
  if (row) {
    row.spHP  = override.sp_hp  ?? 0;
    row.spDf  = override.sp_df  ?? 0;
    row.spSd  = override.sp_sd  ?? 0;
    row.advNatPlus  = override.natPlus  || '';
    row.advNatMinus = override.natMinus || '';
    row.advAbility  = override.ability  || '';
    row.defStatKey = result.moveCat === 'Physical' ? 'df' : 'sd';
    row.move = result.moveName;
    row.movetype = result.moveType;
    row.moveCat = result.moveCat;
    row.minPct = result.minPct;
    row.maxPct = result.maxPct;
    row.isOHKO = result.minPct >= 100;
    row.isPotentialKO = result.maxPct >= 100 && result.minPct < 100;
  }
  renderTable();
}
